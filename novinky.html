    html {
      scrollbar-gutter: stable;
    }

    .topnav{
      width: 100%;
      background: linear-gradient(135deg, #0f4775, #183b5f);
      display: flex;
      justify-content: center;
      gap: 30px;
      position: sticky;
      top: 0;
      z-index: 9999;
      border-bottom: 4px solid #da57b2;
      font-size: 20px;

    .topnav a{
      color: white;

      font-weight: bold;

    }
    .topnav a.active{
      color: #00bfff;
    }

    .season-switch {
      text-align: center;
      margin-bottom: 25px;
    }

    .season-switch button {
      display: inline-block;
      margin: 10px 5px;
      padding:10px 22px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#4da3ff,#1e6bd6);
      color:#000000;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(77,163,255,.35);
      transition:all .25s ease;
    }

    .season-switch button:hover {
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(77,163,255,.5);
    }

    .season-switch button.active {

    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #e2ebf0, #cfd9df);
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #0f4775, #183b5f);
      color: white;
      text-align: center;
      padding: 30px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 { margin: 0; font-size: 2.2rem; }
    header a { color: #bcd4f5; text-decoration: none; font-weight: 600; display:inline-block; margin-top:10px; }

    main { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

    .news-entry {
      background: white;
      border-radius: 12px;
      padding: 20px 25px;
      margin-bottom: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .news-entry:hover { transform: translateY(-3px); box-shadow: 0 6px 14px rgba(0,0,0,0.15); }

    .news-date { font-weight: bold; color: #0f4775; margin-bottom: 5px; }
    .news-title { font-size: 1.3rem; margin-bottom: 8px; color: #183b5f; }
    .news-text { line-height: 1.6; }

    footer {
      text-align: center; padding: 25px; background: #f1f4f8; color: #555; font-size: 0.9rem;
      border-top: 2px solid #d6dde4;
    }

    @media (max-width:700px){
      main{ margin:20px; }
      .news-entry{ padding:15px; }
    }

    /* ===== UDRŽÍ FOOTER DOLE ===== */

}

main {

}

/* SCROLL BAR*/

  <header>
    <h1>🗞️ Novinky 1v1 Ligy</h1>
    <a href="index.html">← Zpět na hlavní stránku</a>
  </header>

  <div class="season-switch">
  <button onclick="changeSeason('2025/26')" class="active">2025/26</button>
  <button onclick="changeSeason('2025')">2025</button>
  </div>

  <main>
    <div id="allNews"></div>
  </main>

  <script src="news.js"></script>

<script>
let currentSeason = "2025/26";

function renderNews(){
  const container = document.getElementById("allNews");
  container.innerHTML = "";

  const filtered = newsData.filter(n => n.season === currentSeason);

  filtered.forEach(n => {
    container.innerHTML += `
      <div class="news-entry">
        <div class="news-date">${n.date}</div>
        <div class="news-title">${n.title}</div>
        <div class="news-text">${n.text}</div>
      </div>
    `;
  });
}

function changeSeason(season){
  currentSeason = season;

  document.querySelectorAll(".season-switch button").forEach(btn => {
    btn.classList.remove("active");
    if(btn.textContent === season){
      btn.classList.add("active");
    }
  });

  renderNews();
}

document.addEventListener("DOMContentLoaded", renderNews);
</script>
