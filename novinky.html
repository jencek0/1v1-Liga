<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novinky - 1v1 Liga</title>
  <link rel="shortcut icon" href="images/1v1logo – upraveno.jpg" type="image/x-icon">
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #e2ebf0, #cfd9df);
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #0f4775, #183b5f);
      color: white;
      text-align: center;
      padding: 30px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 { margin: 0; font-size: 2.2rem; }
    header a { color: #bcd4f5; text-decoration: none; font-weight: 600; display:inline-block; margin-top:10px; }

    main { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

    .news-entry {
      background: white;
      border-radius: 12px;
      padding: 20px 25px;
      margin-bottom: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .news-entry:hover { transform: translateY(-3px); box-shadow: 0 6px 14px rgba(0,0,0,0.15); }

    .news-date { font-weight: bold; color: #0f4775; margin-bottom: 5px; }
    .news-title { font-size: 1.3rem; margin-bottom: 8px; color: #183b5f; }
    .news-text { line-height: 1.6; }

    footer {
      text-align: center; padding: 25px; background: #f1f4f8; color: #555; font-size: 0.9rem;
      border-top: 2px solid #d6dde4;
    }

    @media (max-width:700px){
      main{ margin:20px; }
      .news-entry{ padding:15px; }
    }

    /* ===== UDRŽÍ FOOTER DOLE ===== */
html, body {
  height: 100%;
  margin: 0;
  display: flex;
  flex-direction: column;
}

main {
  flex: 1; /* roztáhne hlavní obsah, aby footer byl dole */
}

/* SCROLL BAR*/
    /* Chrome / Edge / Safari */
.reports-scroll::-webkit-scrollbar{
  width:2px;
}
.reports-scroll::-webkit-scrollbar-track{
  background:rgba(255,255,255,.08);
}
.reports-scroll::-webkit-scrollbar-thumb{
  background:#4da3ff;
  border-radius:10px;
}

/* Firefox */
.reports-scroll{
  scrollbar-width: 100%;
  scrollbar-color: #4da3ff rgba(6, 6, 70, 0.521);
}
  </style>
</head>
<body>
  <header>
    <h1>🗞️ Novinky 1v1 Ligy</h1>
    <a href="index.html">← Zpět na hlavní stránku</a>
  </header>

  <main>
    <div id="allNews"></div>
  </main>

  <script src="news.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const container = document.getElementById("allNews");

  newsData.forEach(n => {
    container.innerHTML += `
      <div class="news-entry">
        <div class="news-date">${n.date}</div>
        <div class="news-title">${n.title}</div>
        <div class="news-text">${n.text}</div>
      </div>
    `;
  });

});
</script>



  <footer>
    © 2025 1v1 Liga Hodonín - Svaz Malého Fotbalu - Všechna práva vyhrazena
  </footer>
</body>
</html>
